<div class="crear-wrapper">
  <div class="crear-card">
    <h2>Organizar Nuevo Partido</h2>
    <p class="subtitle">Rellena los datos para encontrar a los jugadores que te faltan.</p>

    <form (ngSubmit)="onSubmit()" #partidoForm="ngForm">
      <div class="form-group">
        <label for="ubicacion">Ubicación / Polideportivo</label>
        <input type="text" id="ubicacion" name="ubicacion" [(ngModel)]="ubicacion" class="input-field" placeholder="Ej: Polideportivo Municipal" required>
      </div>

      <div class="grid-2-cols">
        <div class="form-group">
          <label for="fecha">Día</label>
          <input type="date" id="fecha" name="fecha" [(ngModel)]="fecha" class="input-field" required>
        </div>
        <div class="form-group">
          <label for="hora">Hora</label>
          <input type="time" id="hora" name="hora" [(ngModel)]="hora" class="input-field" required>
        </div>
      </div>

      <div class="form-group">
        <label for="posiciones">Posiciones Buscadas (separadas por coma)</label>
        <input type="text" id="posiciones" name="posiciones" [(ngModel)]="posicionesInput" class="input-field" required>
      </div>

      <div class="button-group">
        <button type="button" class="btn-outline" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn" [disabled]="isLoading || !partidoForm.form.valid">
          {{ isLoading ? 'Publicando...' : 'Publicar Partido' }}
        </button>
      </div>
    </form>
  </div>
</div>
